unscdarter:
	Inherits: ^Vehicle
	Inherits@CARGOPIPS: ^CargoPips
	Inherits@selection: ^SelectableEconomicUnit
	-HitShape:
	HitShape: 
		TargetableOffsets: 0,0,1536
		Type: Circle
			Radius: 426
			VerticalTopOffset: 1600
			VerticalBottomOffset: 1400
	Buildable:
		Queue: Aircraft
		BuildAtProductionType: Helicopter
		BuildPaletteOrder: 10
		Prerequisites: ~aircraft.unsc
		Description: actor-unscdarter.description
	Valued: # 1200
		Cost: 400
	GivesExperienceMultiplier@value: 
		Modifier: 300
	ProductionCostMultiplier@value:
		Multiplier: 300
	Tooltip:
		Name: actor-unscdarter.name
	UpdatesPlayerStatistics:
		AddToArmyValue: true
	Health:
		HP: 40000
	Harvester:
		Resources: Ore,Gems,Tiberium,BlueTiberium,Oil
		BaleUnloadDelay: 3
		BaleLoadDelay: 9
		SearchFromProcRadius: 15
		SearchFromHarvesterRadius: 8
		EmptyCondition: no-ore
	WithHarvestOverlay:
		Sequence: collect
		LocalOffset: 0,0,0
	WithDockingOverlay:
		Sequence: deliver
	ChangesHealth:
		Step: 100
		Delay: 25
		StartIfBelow: 50
		DamageCooldown: 500
	RevealsShroud:
		MinRange: 6c0
		Range: 8c0
		Type: GroundPosition
		RevealGeneratedShroud: False
	RevealsShroud@GAPGEN:
		Range: 6c0
		Type: GroundPosition
	SpawnActorOnDeath:
		Actor: unscdarter.Husk
	Selectable:
		Bounds: 1706, 1536, 0,-1536
		DecorationBounds: 1706, 1536,0,-1536
	FireWarheadsOnDeath:
		RequiresCondition: !no-ore
		Weapon: OreExplosion
	Mobile:
		Speed: 96
		Locomotor: chinook
		Voice: Move
	WithStoresResourcesPipsDecoration:
		Position: BottomLeft
		RequiresSelection: true
		PipCount: 7
		ResourceSequences:
			Ore: pip-yellow
			Gems: pip-red
			Tiberium: pip-green
			BlueTiberium: pip-blue
			Oil: pip-oil
	Hovers:
		InitialHeight: 1536
	WithShadow:
		Offset: 43, 1536, 0
		ZOffset: -129
	GrantConditionOnPrerequisite@1:
		Condition: upgradesupplylines
		Prerequisites: upgrade.supplylines
	Voiced:
		VoiceSet: ChinookVoice
	GpsDot:
		String: Harvester
	Targetable:
		TargetTypes: Air, AirborneActor
	-Passenger:
	ProductionCostMultiplier@airforcegeneral:
		Multiplier: 75
		Prerequisites: upgrade.cheaperplanes
	ProductionTimeMultiplier@airforcegeneral:
		Multiplier: 75
		Prerequisites: upgrade.cheaperplanes
	ProductionCostMultiplier@AIairforcegeneral:
		Multiplier: 30
		Prerequisites: ai.all && upgrade.aircraftgeneral
	ProductionTimeMultiplier@AIairforcegeneral:
		Multiplier: 30
		Prerequisites: ai.all && upgrade.aircraftgeneral
	DockClientManager:
	StoresResources:
		Capacity: 20
		Resources: Ore,Gems,Tiberium,BlueTiberium,Oil
	GrantConditionOnPrerequisite@hatetib:
		Prerequisites: ai.hatetib
		Condition: ai.hatetib
	ProximityExternalCondition@hatetib:
		RequiresCondition: ai.hatetib
		Range: 8c0
		ValidRelationships: Neutral, Enemy
		Condition: makecreeps

unschornet:
	Inherits: ^Helicopter
	Inherits@AUTOTARGET: ^AutoTargetGroundAssaultMove
	Buildable:
		Queue: Aircraft
		BuildAtProductionType: Helicopter
		BuildPaletteOrder: 20
		Prerequisites: ~aircraft.unsc
		Description: actor-unschornet.description
	Valued:
		Cost: 900
	Tooltip:
		Name: actor-unschornet.name
	UpdatesPlayerStatistics:
		AddToArmyValue: true
	Health:
		HP: 7500
	RevealsShroud:
		MinRange: 8c0
		Range: 10c0
		Type: GroundPosition
		RevealGeneratedShroud: False
	RevealsShroud@GAPGEN:
		Range: 8c0
		Type: GroundPosition
	Armament@PRIMARY:
		Weapon: unscwarthogminigun
		Delay: 1
		LocalOffset: 85,-213,-85, 85,213,-85
		MuzzleSequence: muzzle
	Armament@SECONDARY:
		Name: secondary
		Weapon: unscwarthogminigun
		LocalOffset: 85,213,-85, 85,-213,-85
		MuzzleSequence: muzzle
	Armament@TRI:
		Weapon: unscrocketlauncher
		LocalOffset: 0,-213,-85, 0,213,-85
		PauseOnCondition: !ammo
	Armament@QUAD:
		Weapon: unscrocketlauncheraa
		LocalOffset: 0,213,-85, 0,-213,-85
		PauseOnCondition: !ammo
	AttackAircraft:
		FacingTolerance: 80
		PersistentTargeting: false
		AttackType: Hover
		OpportunityFire: true
	Aircraft:
		TurnSpeed: 16
		Speed: 112
		Voice: Move
	Guard:
		Voice: Move
	AutoTarget:
		InitialStance: HoldFire
		InitialStanceAI: HoldFire
	AmmoPool:
		Ammo: 24
		ReloadDelay: 8
		AmmoCondition: ammo
	WithMuzzleOverlay:
	SpawnActorOnDeath:
		Actor: unschornet.Husk
	LeavesTrails:
		Offsets: -427,0,0
		Image: smokey
		MovingInterval: 3
		SpawnAtLastPosition: False
		Type: CenterPosition
		RequiresCondition: enable-smoke
		TrailWhileStationary: True
		StationaryInterval: 3
	ProducibleWithLevel:
		Prerequisites: aircraft.upgraded
	Selectable:
		DecorationBounds: 1621, 1365
	WithAmmoPipsDecoration:
		Position: BottomLeft
		Margin: 4, 3
		RequiresSelection: true
		PipCount: 6
	GrantConditionOnDamageState@SmokeTrail:
		Condition: enable-smoke
	WithProductionIconOverlay:
		Types: Veterancy
		Prerequisites: aircraft.upgraded
	ReloadAmmoPool@reloadnear:
		RequiresCondition: reloadnear
		Delay: 500
		Count: 12
	Voiced:
		VoiceSet: ComancheVoice

