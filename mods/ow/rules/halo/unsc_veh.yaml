unscwarthog:
	Inherits: ^Vehicle
	Inherits@GAINSEXPERIENCE: ^GainsExperience
	Inherits@AUTOTARGET: ^AutoTargetAllAssaultMove
	Buildable:
		Queue: Vehicle
		BuildPaletteOrder: 30
		Prerequisites: ~vehicles.unsc, ~techlevel.low
		Description: actor-unscwarthog.description
	Tooltip:
		Name: actor-unscwarthog.name
	Valued:
		Cost: 600
	Armor:
		Type: Light
	Mobile:
		Locomotor: wheeled
		TurnSpeed: 32
		Speed: 135
	RevealsShroud:
		MinRange: 5c0
		Range: 8c0
		RevealGeneratedShroud: False
	RevealsShroud@GAPGEN:
		Range: 5c0
	UpdatesPlayerStatistics:
		AddToArmyValue: true
	Health:
		HP: 18000
	Turreted:
		TurnSpeed: 40
		Offset: -298,0,212
	GrantRandomPeriodicCondition:
		Conditions: fake1, rocketlauncher
		CooldownDuration: 1
		ActiveDuration: 90000
		PauseOnCondition: warthogweapons
	GrantRandomPeriodicCondition@warthogweapons:
		Conditions: fake1, rocketlauncher, missilebarrage, railgun
		CooldownDuration: 1
		ActiveDuration: 90000
		RequiresCondition: warthogweapons
	Armament:
		Weapon: unscwarthogminigun
		LocalOffset: 171,0,256
		PauseOnCondition: rocketlauncher || missilebarrage || railgun
	Armament@rocketlauncher:
		Weapon: unscwarthogrocketlauncher
		LocalOffset: 171,0,256
		RequiresCondition: rocketlauncher
	Armament@rocketlauncheraa:
		Weapon: unscwarthogrocketlauncheraa
		LocalOffset: 171,0,256
		RequiresCondition: rocketlauncher
	Armament@flamerthrower:
		Weapon: unscflamethrower
		LocalOffset: 171,0,256
		RequiresCondition: flamerthrower
	Armament@missilebarrage:
		Weapon: unscgrizzlyrockets
		LocalOffset: 171,0,288, 171,0,224
		RequiresCondition: missilebarrage
	Armament@railgun:
		Weapon: unscwarthograilgun
		LocalOffset: 171,0,256
		RequiresCondition: railgun
	AttackTurreted:
		PauseOnCondition: disabled 
	FireProjectilesOnDeath:
		Weapons: TechnicalTurret
		Pieces: 1,1
		Range: 1c0, 3c0
	RenderSprites:
		Image: unscwarthog
	GrantConditionOnPrerequisite@warthogweapons:
		Condition: warthogweapons
		Prerequisites: unsc.warthogweapons

