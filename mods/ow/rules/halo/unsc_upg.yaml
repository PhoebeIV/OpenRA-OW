unsc.fraggrenades:
	Inherits: ^UpgradeBaseExt
	Tooltip:
		Name: actor-unsc-fraggrenades.name
	Buildable:
		Description: actor-unsc-fraggrenades.description
		BuildPaletteOrder: 10014
		Prerequisites: ~structures.unsc, techcenter
		BuildDuration: 2500
	ProductionCostMultiplier@upgrade:
		Multiplier: 5000
	ProvidesPrerequisite@upgradename:
	ExternalCondition@PRODUCED:
		Condition: produced
	WithProductionIconOverlay:
		Types: UpgradeComplete
		Prerequisites: unsc.fraggrenades

